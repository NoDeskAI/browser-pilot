name: browser-pilot-single-host

services:
  reverse-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/templates:/etc/nginx/templates:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    environment:
      NGINX_ENVSUBST_FILTER: "^NGINX_"
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:?set NGINX_SERVER_NAME, for example browser.example.com}
      NGINX_TLS_CERT_FILE: ${NGINX_TLS_CERT_FILE:-fullchain.pem}
      NGINX_TLS_KEY_FILE: ${NGINX_TLS_KEY_FILE:-privkey.pem}
    depends_on:
      backend:
        condition: service_started
    networks:
      - app

  backend:
    build:
      context: .
      args:
        EDITION: ${EDITION:-ce}
    expose:
      - "8000"
    volumes:
      - egressdata:/app/data/network-egress
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: .env
        required: false
    environment:
      PROJECT_ROOT: /app
      APP_ENV: ${APP_ENV:-production}
      APP_PUBLIC_ORIGINS: ${APP_PUBLIC_ORIGINS:?set APP_PUBLIC_ORIGINS, for example https://browser.example.com}
      BROWSER_RUNTIME_ACCESS_MODE: private
      BROWSER_VNC_PASSWORD_SECRET: ${BROWSER_VNC_PASSWORD_SECRET:?set BROWSER_VNC_PASSWORD_SECRET}
      VIEWER_TICKET_TTL_SECONDS: ${VIEWER_TICKET_TTL_SECONDS:-60}
      FILE_DOWNLOAD_URL_TTL_SECONDS: ${FILE_DOWNLOAD_URL_TTL_SECONDS:-300}
      DATABASE_URL: postgresql://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:?set POSTGRES_DB}
      DOCKER_HOST_ADDR: host.docker.internal
      API_BASE_URL: ${API_BASE_URL:?set API_BASE_URL, for example https://browser.example.com}
      BROWSER_RUNTIME_BACKEND_URL: ${BROWSER_RUNTIME_BACKEND_URL:-http://backend:8000}
      BROWSER_RUNTIME_CONTROL_URL: http://runtime-worker:8001
      BROWSER_RUNTIME_CONTROL_TOKEN: ${BROWSER_RUNTIME_CONTROL_TOKEN:?set BROWSER_RUNTIME_CONTROL_TOKEN}
      CLOAK_BROWSER_IMAGE_NAME: ${CLOAK_BROWSER_IMAGE_NAME:-browser-pilot-cloak:latest}
      BP_LEGACY_DOCKER_DOWNLOAD_WATCHER: "false"
      NETWORK_EGRESS_DOCKER_NETWORK: ${NETWORK_EGRESS_DOCKER_NETWORK:-browser-pilot-single-host-net}
      NETWORK_EGRESS_CONFIG_DIR: ${NETWORK_EGRESS_CONFIG_DIR:-/app/data/network-egress}
      NETWORK_EGRESS_CLASH_IMAGE: ${NETWORK_EGRESS_CLASH_IMAGE:-ghcr.io/metacubex/mihomo:latest}
      NETWORK_EGRESS_CLASH_PROXY_PORT: ${NETWORK_EGRESS_CLASH_PROXY_PORT:-7890}
      NETWORK_EGRESS_OPENVPN_IMAGE: ${NETWORK_EGRESS_OPENVPN_IMAGE:-browser-pilot-openvpn-egress:latest}
      NETWORK_EGRESS_OPENVPN_PROXY_PORT: ${NETWORK_EGRESS_OPENVPN_PROXY_PORT:-8888}
      MINIO_STORAGE_BOOTSTRAP: "true"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:?set MINIO_BUCKET}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:?set MINIO_PUBLIC_ENDPOINT to a public S3/MinIO endpoint}
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      runtime-worker:
        condition: service_healthy
    networks:
      - app
      - runtime

  runtime-worker:
    build:
      context: .
      args:
        EDITION: ${EDITION:-ce}
    command: uvicorn app.runtime_worker:app --host 0.0.0.0 --port 8001
    expose:
      - "8001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - egressdata:/app/data/network-egress
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PROJECT_ROOT: /app
      BROWSER_RUNTIME_CONTROL_TOKEN: ${BROWSER_RUNTIME_CONTROL_TOKEN:?set BROWSER_RUNTIME_CONTROL_TOKEN}
      BROWSER_RUNTIME_COMMAND_MAX_TIMEOUT: ${BROWSER_RUNTIME_COMMAND_MAX_TIMEOUT:-3600}
      NETWORK_EGRESS_CONFIG_DIR: ${NETWORK_EGRESS_CONFIG_DIR:-/app/data/network-egress}
      NETWORK_EGRESS_DOCKER_NETWORK: ${NETWORK_EGRESS_DOCKER_NETWORK:-browser-pilot-single-host-net}
      NETWORK_EGRESS_CLASH_IMAGE: ${NETWORK_EGRESS_CLASH_IMAGE:-ghcr.io/metacubex/mihomo:latest}
      NETWORK_EGRESS_CLASH_PROXY_PORT: ${NETWORK_EGRESS_CLASH_PROXY_PORT:-7890}
      NETWORK_EGRESS_OPENVPN_IMAGE: ${NETWORK_EGRESS_OPENVPN_IMAGE:-browser-pilot-openvpn-egress:latest}
      NETWORK_EGRESS_OPENVPN_PROXY_PORT: ${NETWORK_EGRESS_OPENVPN_PROXY_PORT:-8888}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/healthz', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app
      - runtime

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\""]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - app

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    expose:
      - "9000"
    volumes:
      - miniodata:/data
    networks:
      - app

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:?set MINIO_BUCKET}
    entrypoint: >
      /bin/sh -c '
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          sleep 1;
        done;
        mc mb --ignore-existing "local/$$MINIO_BUCKET";
      '
    networks:
      - app

  selenium:
    build:
      context: ./services/selenium-chrome
      args:
        BASE_IMAGE: ${SELENIUM_BASE_IMAGE:-selenium/standalone-chrome:latest}
    image: ${SELENIUM_IMAGE_NAME:-browser-pilot-selenium}
    profiles: ["build"]

  cloak:
    build:
      context: ./services/cloak-chromium-runtime
    image: ${CLOAK_BROWSER_IMAGE_NAME:-browser-pilot-cloak:latest}
    profiles: ["build"]

volumes:
  pgdata:
  egressdata:
  miniodata:

networks:
  app:
  runtime:
    name: ${NETWORK_EGRESS_DOCKER_NETWORK:-browser-pilot-single-host-net}
