<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- Windows: metric-compatible CrOS fonts -->
  <alias><family>Arial</family><prefer><family>Arimo</family></prefer></alias>
  <alias><family>Times New Roman</family><prefer><family>Tinos</family></prefer></alias>
  <alias><family>Courier New</family><prefer><family>Cousine</family></prefer></alias>
  <alias><family>Calibri</family><prefer><family>Carlito</family></prefer></alias>
  <alias><family>Cambria</family><prefer><family>Caladea</family></prefer></alias>
  <alias><family>Consolas</family><prefer><family>Cousine</family></prefer></alias>
  <alias><family>Segoe UI</family><prefer><family>Arimo</family></prefer></alias>
  <alias><family>Verdana</family><prefer><family>Arimo</family></prefer></alias>
  <alias><family>Georgia</family><prefer><family>Tinos</family></prefer></alias>
  <alias><family>Tahoma</family><prefer><family>Arimo</family></prefer></alias>
  <!-- Legacy aliases stay on the same metric-compatible font set. -->
  <alias><family>Helvetica Neue</family><prefer><family>Arimo</family></prefer></alias>
  <alias><family>Helvetica</family><prefer><family>Arimo</family></prefer></alias>
  <alias><family>Menlo</family><prefer><family>Cousine</family></prefer></alias>
  <alias><family>Monaco</family><prefer><family>Cousine</family></prefer></alias>
  <alias><family>Avenir</family><prefer><family>Arimo</family></prefer></alias>
  <alias><family>Avenir Next</family><prefer><family>Arimo</family></prefer></alias>
  <alias><family>Futura</family><prefer><family>Arimo</family></prefer></alias>
  <alias><family>Gill Sans</family><prefer><family>Arimo</family></prefer></alias>
  <alias><family>Optima</family><prefer><family>Arimo</family></prefer></alias>
  <alias><family>Palatino</family><prefer><family>Tinos</family></prefer></alias>
</fontconfig>
