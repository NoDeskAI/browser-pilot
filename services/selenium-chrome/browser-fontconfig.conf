<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <dir>/usr/share/fonts/truetype/croscore</dir>
  <dir>/usr/share/fonts/truetype/crosextra</dir>
  <dir>/usr/share/fonts/opentype/noto</dir>
  <cachedir>/tmp/browser-fontconfig-cache</cachedir>

  <match target="scan">
    <test name="family" compare="contains"><string>Noto Sans CJK</string></test>
    <edit name="family" mode="assign_replace"><string>Microsoft YaHei</string></edit>
  </match>
  <match target="scan">
    <test name="family" compare="contains"><string>Noto Sans Mono CJK</string></test>
    <edit name="family" mode="assign_replace"><string>Microsoft YaHei</string></edit>
  </match>
  <match target="scan">
    <test name="family" compare="contains"><string>Noto Serif CJK</string></test>
    <edit name="family" mode="assign_replace"><string>SimSun</string></edit>
  </match>

  <alias><family>Arial</family><prefer><family>Arimo</family></prefer></alias>
  <alias><family>Times New Roman</family><prefer><family>Tinos</family></prefer></alias>
  <alias><family>Courier New</family><prefer><family>Cousine</family></prefer></alias>
  <alias><family>Consolas</family><prefer><family>Cousine</family></prefer></alias>
  <alias><family>Calibri</family><prefer><family>Carlito</family></prefer></alias>
  <alias><family>Cambria</family><prefer><family>Caladea</family></prefer></alias>
  <alias><family>Segoe UI</family><prefer><family>Arimo</family><family>Microsoft YaHei</family></prefer></alias>
  <alias><family>Verdana</family><prefer><family>Arimo</family></prefer></alias>
  <alias><family>Georgia</family><prefer><family>Tinos</family></prefer></alias>
  <alias><family>Tahoma</family><prefer><family>Arimo</family></prefer></alias>
  <alias><family>Trebuchet MS</family><prefer><family>Arimo</family></prefer></alias>
  <alias><family>Microsoft YaHei UI</family><prefer><family>Microsoft YaHei</family></prefer></alias>
  <alias><family>Microsoft YaHei</family><prefer><family>Microsoft YaHei</family></prefer></alias>
  <alias><family>SimHei</family><prefer><family>Microsoft YaHei</family></prefer></alias>
  <alias><family>SimSun</family><prefer><family>SimSun</family></prefer></alias>
  <alias><family>NSimSun</family><prefer><family>SimSun</family></prefer></alias>
  <alias><family>sans-serif</family><prefer><family>Arial</family><family>Microsoft YaHei</family></prefer></alias>
  <alias><family>serif</family><prefer><family>Times New Roman</family><family>SimSun</family></prefer></alias>
  <alias><family>monospace</family><prefer><family>Courier New</family><family>Microsoft YaHei</family></prefer></alias>

  <selectfont>
    <rejectfont><glob>/usr/share/fonts/truetype/dejavu/*</glob></rejectfont>
    <rejectfont><glob>/usr/share/fonts/truetype/liberation*/*</glob></rejectfont>
    <rejectfont><glob>/usr/share/fonts/truetype/noto/*</glob></rejectfont>
    <rejectfont><glob>/usr/share/fonts/truetype/nimbus/*</glob></rejectfont>
    <rejectfont><glob>/usr/share/fonts/truetype/wqy/*</glob></rejectfont>
    <rejectfont><glob>/usr/share/fonts/opentype/ipafont*/*</glob></rejectfont>
    <rejectfont><glob>/usr/share/fonts/truetype/ubuntu/*</glob></rejectfont>
  </selectfont>
</fontconfig>
