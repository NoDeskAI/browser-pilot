{{- if .Values.admissionPolicy.enabled }}
{{- $digests := list -}}
{{- range .Values.runtime.approvedImages }}
{{- if .imageDigest }}
{{- $digests = append $digests .imageDigest -}}
{{- end }}
{{- end }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: {{ include "browser-pilot.fullname" . }}-runtime-pods
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchConditions:
    - name: browser-pilot-session-pod
      expression: "has(object.metadata.labels) && object.metadata.labels['app.kubernetes.io/name'] == 'browser-pilot-session'"
  validations:
    - expression: "!has(object.spec.hostNetwork) || object.spec.hostNetwork == false"
      message: "browser-pilot session pods must not use hostNetwork"
    - expression: "!has(object.spec.hostPID) || object.spec.hostPID == false"
      message: "browser-pilot session pods must not use hostPID"
    - expression: "!has(object.spec.hostIPC) || object.spec.hostIPC == false"
      message: "browser-pilot session pods must not use hostIPC"
    - expression: "has(object.spec.serviceAccountName) && object.spec.serviceAccountName == '{{ include "browser-pilot.sessionServiceAccountName" . }}'"
      message: "browser-pilot session pods must use the locked session service account"
    - expression: "!has(object.spec.automountServiceAccountToken) || object.spec.automountServiceAccountToken == false"
      message: "browser-pilot session pods must not automount Kubernetes service account tokens"
    - expression: "!has(object.spec.volumes) || object.spec.volumes.all(v, !has(v.hostPath))"
      message: "browser-pilot session pods must not use hostPath volumes"
    - expression: "!has(object.spec.initContainers) || size(object.spec.initContainers) == 0"
      message: "browser-pilot session pods must not use init containers"
    - expression: "!has(object.spec.ephemeralContainers) || size(object.spec.ephemeralContainers) == 0"
      message: "browser-pilot session pods must not use ephemeral containers"
    - expression: "object.spec.containers.all(c, !has(c.securityContext) || !has(c.securityContext.privileged) || c.securityContext.privileged == false)"
      message: "browser-pilot session containers must not be privileged"
    - expression: "object.spec.containers.all(c, has(c.securityContext) && has(c.securityContext.allowPrivilegeEscalation) && c.securityContext.allowPrivilegeEscalation == false)"
      message: "browser-pilot session containers must disable privilege escalation"
    - expression: "object.spec.containers.all(c, has(c.securityContext) && has(c.securityContext.capabilities) && c.securityContext.capabilities.drop.exists(cap, cap == 'ALL'))"
      message: "browser-pilot session containers must drop all Linux capabilities"
    - expression: "object.spec.containers.all(c, !has(c.ports) || c.ports.all(p, !has(p.hostPort)))"
      message: "browser-pilot session containers must not use hostPort"
    - expression: "object.spec.containers.all(c, has(c.resources) && has(c.resources.requests) && has(c.resources.limits))"
      message: "browser-pilot session containers must declare resource requests and limits"
    {{- if gt (len $digests) 0 }}
    - expression: >-
        object.spec.containers.all(c, {{ toJson $digests }}.exists(d, c.image.endsWith(d)))
      message: "browser-pilot session containers must use an approved image digest"
    {{- else }}
    - expression: "false"
      message: "no approved browser-pilot runtime image digests configured"
    {{- end }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: {{ include "browser-pilot.fullname" . }}-runtime-pods
spec:
  policyName: {{ include "browser-pilot.fullname" . }}-runtime-pods
  validationActions: ["Deny"]
  matchResources:
    namespaceSelector:
      matchLabels:
        browser-pilot/managed-runtime-namespace: "true"
{{- end }}
