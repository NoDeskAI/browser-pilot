image:
  repository: ghcr.io/nodeskai/browser-pilot-ee
  digest: ""
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  port: 8000

ingress:
  enabled: false
  className: ""
  hosts: []
  tls: []

env:
  appTitle: Browser Pilot
  appEnv: production
  publicOrigins: ""
  apiBaseUrl: ""
  browserHomeUrl: https://www.google.com/
  jwtSecretName: browser-pilot-jwt
  databaseSecretName: browser-pilot-database
  s3SecretName: browser-pilot-s3

runtime:
  provider: kubernetes
  backendServiceAccountName: browser-pilot-backend
  sessionServiceAccountName: browser-pilot-session
  podSecurityLevel: baseline
  defaultActiveSessionLimit: 3
  defaultMaxSessionSeconds: 3600
  approvedImages: []
  tenants: []
  defaultQuota:
    hard:
      pods: "20"
      requests.cpu: "8"
      requests.memory: 32Gi
      limits.cpu: "16"
      limits.memory: 64Gi
  defaultLimits:
    container:
      defaultRequest:
        cpu: "500m"
        memory: 2Gi
        ephemeral-storage: 4Gi
      default:
        cpu: "2"
        memory: 4Gi
        ephemeral-storage: 8Gi

admissionPolicy:
  enabled: true

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi
