apiVersion: apps/v1
kind: Deployment
metadata:
  name: browser-pilot-ee-saas-browser-pilot-frontend
  namespace: browser-pilot
  labels:
    app.kubernetes.io/name: browser-pilot
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: browser-pilot-ee-saas
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: browser-pilot
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: browser-pilot
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: browser-pilot-ee-saas
    spec:
      imagePullSecrets:
        - name: cr-nodesk-center-cn-beijing
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: REPLACE_WITH_FRONTEND_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: browser-pilot-ee-saas-browser-pilot-frontend
  namespace: browser-pilot
  labels:
    app.kubernetes.io/name: browser-pilot
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: browser-pilot-ee-saas
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: browser-pilot
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 8080
      targetPort: http
