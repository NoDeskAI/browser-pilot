services:
  # ===== 方案 1: n.eko (WebRTC 多人协作) =====
  neko:
    build: ./services/neko-chrome
    restart: unless-stopped
    shm_size: "2gb"
    cap_add:
      - SYS_ADMIN
    ports:
      - "8080:8080"
      - "52000-52100:52000-52100/udp"
    environment:
      NEKO_SCREEN: "1920x1080@30"
      NEKO_PASSWORD: neko
      NEKO_PASSWORD_ADMIN: admin
      NEKO_ICELITE: 1
      NEKO_NAT1TO1: "127.0.0.1"
      NEKO_EPR: "52000-52100"

  # ===== 方案 2: noVNC + x11vnc (经典 VNC) =====
  novnc-chrome:
    build: ./services/novnc-chrome
    restart: unless-stopped
    shm_size: "1gb"
    ports:
      - "6080:6080"
      - "6081:6081"

  # ===== 方案 3: KasmVNC (现代 VNC) =====
  kasmvnc:
    build: ./services/kasmvnc-chrome
    restart: unless-stopped
    shm_size: "1gb"
    ports:
      - "6901:6901"
    environment:
      VNC_PW: password
      LAUNCH_URL: "https://www.baidu.com"
      VNCOPTIONS: "-DisableBasicAuth 1"

  # ===== 方案 4: Browserless (CDP 调试器) =====
  browserless:
    image: browserless/chrome:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MAX_CONCURRENT_SESSIONS: 5
      CONNECTION_TIMEOUT: 86400000
      KEEP_ALIVE: "true"
      CHROME_REFRESH_TIME: 86400000

  browserless-proxy:
    build: ./services/cdp-proxy
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      - browserless
    environment:
      CHROME_HOST: browserless
      CHROME_PORT: 3000
      PORT: 3001
      BROWSER_WS: "1"

  # ===== 方案 5: CDP DIY (自研截屏流) =====
  chrome-headless:
    build: ./services/chrome-headless
    restart: unless-stopped
    ports:
      - "9222:9222"
    command:
      - "--no-sandbox"
      - "--disable-gpu"
      - "--remote-allow-origins=*"
      - "--disable-blink-features=AutomationControlled"

  cdp-proxy:
    build: ./services/cdp-proxy
    restart: unless-stopped
    ports:
      - "3100:3100"
    depends_on:
      - chrome-headless
    environment:
      CHROME_HOST: chrome-headless
      CHROME_PORT: 9222
      PORT: 3100

  # ===== 方案 6: Selenium Grid (测试 VNC) =====
  selenium:
    build: ./services/selenium-chrome
    restart: unless-stopped
    shm_size: "2gb"
    ports:
      - "4444:4444"
      - "7900:7900"
    environment:
      SE_VNC_NO_PASSWORD: 1

  # ===== 方案 7: MJPEG 截屏流 =====
  mjpeg-stream:
    build: ./services/mjpeg-stream
    restart: unless-stopped
    shm_size: "1gb"
    ports:
      - "3200:3200"
    environment:
      PORT: 3200
