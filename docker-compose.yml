services:
  agent-backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SELENIUM_BASE_URL: http://selenium:4444
    depends_on:
      - selenium

  selenium:
    build: ./services/selenium-chrome
    restart: unless-stopped
    shm_size: "2gb"
    ports:
      - "4444:4444"
      - "7900:7900"
    environment:
      SE_VNC_NO_PASSWORD: 1
      SE_SCREEN_WIDTH: 1366
      SE_SCREEN_HEIGHT: 768
