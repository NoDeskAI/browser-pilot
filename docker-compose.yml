services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nodeskpane
      POSTGRES_PASSWORD: nodeskpane
      POSTGRES_DB: nodeskpane
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nodeskpane"]
      interval: 3s
      timeout: 3s
      retries: 5

  selenium:
    build: ./services/selenium-chrome
    profiles: ["build"]

volumes:
  pgdata:
