services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nodeskpane}:${POSTGRES_PASSWORD:-nodeskpane}@postgres:5432/${POSTGRES_DB:-nodeskpane}
      DOCKER_HOST_ADDR: host.docker.internal
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nodeskpane}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nodeskpane}
      POSTGRES_DB: ${POSTGRES_DB:-nodeskpane}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nodeskpane}"]
      interval: 3s
      timeout: 3s
      retries: 5

  selenium:
    build:
      context: ./services/selenium-chrome
      args:
        BASE_IMAGE: ${SELENIUM_BASE_IMAGE:-selenium/standalone-chrome:latest}
    image: ${SELENIUM_IMAGE_NAME:-browser-pilot-selenium}
    profiles: ["build"]

volumes:
  pgdata:
