services:
  backend:
    build:
      context: .
      args:
        EDITION: ${EDITION:-ce}
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - egressdata:/app/data/network-egress
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: .env
        required: false
    environment:
      PROJECT_ROOT: /app
      DATABASE_URL: postgresql://${POSTGRES_USER:-bpilot}:${POSTGRES_PASSWORD:-bpilot}@postgres:5432/${POSTGRES_DB:-bpilot}
      DOCKER_HOST_ADDR: host.docker.internal
      NETWORK_EGRESS_DOCKER_NETWORK: ${NETWORK_EGRESS_DOCKER_NETWORK:-browser-pilot-net}
      NETWORK_EGRESS_CONFIG_DIR: ${NETWORK_EGRESS_CONFIG_DIR:-/app/data/network-egress}
      NETWORK_EGRESS_CLASH_IMAGE: ${NETWORK_EGRESS_CLASH_IMAGE:-ghcr.io/metacubex/mihomo:latest}
      NETWORK_EGRESS_CLASH_PROXY_PORT: ${NETWORK_EGRESS_CLASH_PROXY_PORT:-7890}
      NETWORK_EGRESS_OPENVPN_IMAGE: ${NETWORK_EGRESS_OPENVPN_IMAGE:-browser-pilot-openvpn-egress:latest}
      NETWORK_EGRESS_OPENVPN_PROXY_PORT: ${NETWORK_EGRESS_OPENVPN_PROXY_PORT:-8888}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bpilot}
      POSTGRES_DB: ${POSTGRES_DB:-bpilot}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bpilot}"]
      interval: 3s
      timeout: 3s
      retries: 5

  selenium:
    build:
      context: ./services/selenium-chrome
      args:
        BASE_IMAGE: ${SELENIUM_BASE_IMAGE:-selenium/standalone-chrome:latest}
    image: ${SELENIUM_IMAGE_NAME:-browser-pilot-selenium}
    profiles: ["build"]

volumes:
  pgdata:
  egressdata:
